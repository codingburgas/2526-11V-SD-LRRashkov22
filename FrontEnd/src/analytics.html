<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="app">

  <!-- Sidebar -->
  <div class="sidebar">
    <div>
      <h4>PFT</h4>
      <hr>
      <a  href="./dashboard.html">Dashboard</a>
      <a class="active">Analytics</a>
      <br>
      <small>MANAGEMENT</small>
      <a href="./Transaction.html">Transactions</a>
      <a href="./Cards.html">Cards</a>
      <a href="./Savings.html">Savings</a>
    </div>
    <a onclick="logout()">Log Out</a>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="row">
      <div class="col-md-6">
        <!-- Left container for pie chart -->
        <div class="bg-dark p-3" style="min-height: 52vh;">
          <!-- Pie chart will go here -->
        </div>
      </div>
      <div class="col-md-6">
        <!-- Right container for progressive bars -->
        <div class="bg-dark p-3" style="min-height: 52vh; overflow-y: auto;">
          <!-- Progressive bars will go here -->
        </div>
      </div>
    </div>
    <div class="row mt-3">
      <div class="col-12">
        <!-- Table below -->
        <div class="bg-dark p-3">
          <table class="table table-striped">
            <thead>
              <tr>
                <th>Category</th>
                <th>Budget</th>
                <th>Spent</th>
                <th>Remaining</th>
                <th>%</th>
              </tr>
            </thead>
            <tbody id="analytics-table-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="pages/analytics.js"></script>
<script type="module" src="main.js"></script>
</body>
</html>
